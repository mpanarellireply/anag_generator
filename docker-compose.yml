services:
  anag-generator:
    build: .
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./jobs:/app/jobs
      - ./debug:/app/debug
      - ./output:/app/output
      - ./parser_cache:/app/parser_cache
      - ./logs:/app/logs
